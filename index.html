    <style>
        body {
            background-color: #fdfbf7;
            color: #44403c;
            -webkit-tap-highlight-color: transparent;
            user-select: none; /* 防止長按選取文字 */
        }
        
        /* 隱藏 Scrollbar 但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 行程卡片互動特效 */
        .trip-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .trip-card.active {
            border-color: #ea580c;
            background-color: #fff7ed;
            transform: scale(1.01);
            box-shadow: 0 4px 12px rgba(234, 88, 12, 0.1);
        }
        
        /* 貓掌印章動畫 */
        .paw-stamp {
            position: absolute;
            bottom: -10px;
            right: -10px;
            font-size: 4rem;
            color: #ea580c;
            opacity: 0;
            transform: scale(0.5) rotate(-20deg);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 0;
        }
        .trip-card.active .paw-stamp {
            opacity: 0.1;
            transform: scale(1) rotate(0deg);
            bottom: -5px;
            right: -5px;
        }

        /* 時間軸橘色點點 */
        .timeline-dot {
            transition: background-color 0.3s, transform 0.3s;
        }
        .timeline-dot.active-dot {
            background-color: #ea580c !important;
            border-color: #fff;
            transform: scale(1.3);
            box-shadow: 0 0 0 3px #ffedd5;
        }

        /* 導覽頁：摺疊動畫 */
        .guide-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease-in-out;
            opacity: 0;
        }
        .guide-content.open {
            max-height: 8000px;
            opacity: 1;
        }
        .guide-arrow {
            transition: transform 0.3s;
        }
        .guide-arrow.open {
            transform: rotate(180deg);
            background-color: #ea580c;
            color: white;
            border-color: #ea580c;
        }

        /* 圖片輪播容器 */
        .scroll-gallery {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1rem;
            padding-bottom: 1rem;
        }
        .scroll-item {
            scroll-snap-align: center;
            flex: 0 0 90%;
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid #eee;
            position: relative;
        }
        .scroll-indicator {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
        }

        /* 輸入框樣式 */
        .muji-input {
            width: 100%;
            background: #f5f5f4;
            border: none;
            border-radius: 12px;
            padding: 12px;
            outline: none;
            transition: box-shadow 0.2s;
        }
        .muji-input:focus {
            box-shadow: 0 0 0 2px #ea580c;
        }
        
        /* 複製提示 */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }
        .toast.show { opacity: 1; }

        /* 長按動畫 */
        .long-press-active {
            transform: scale(0.95);
            background-color: #fee2e2; /* Red-100 */
        }
    </style>

        // --- Helper: Get Icon for Checklist (Specific Matching) ---
        function getIcon(name) {
            // Document / Money
            if (name.includes('護照') || name.includes('駕照')) return 'fa-id-card';
            if (name.includes('錢') || name.includes('幣') || name.includes('卡')) return 'fa-credit-card';
            
            // Clothing
            if (name.includes('衣') || name.includes('背心') || name.includes('外套')) return 'fa-shirt';
            if (name.includes('褲') || name.includes('裙')) return 'fa-layer-group';
            if (name.includes('襪')) return 'fa-socks';
            if (name.includes('圍巾')) return 'fa-user-tie';
            if (name.includes('手套')) return 'fa-mitten';
            
            // Toiletries
            if (name.includes('洗') || name.includes('卸') || name.includes('乳') || name.includes('膏') || name.includes('刷')) return 'fa-pump-soap';
            if (name.includes('妝') || name.includes('保養') || name.includes('防晒')) return 'fa-spray-can-sparkles';
            if (name.includes('唇')) return 'fa-face-smile-beam';
            
            // Electronics
            if (name.includes('電') || name.includes('SIM') || name.includes('Hub') || name.includes('充')) return 'fa-plug';
            if (name.includes('手機')) return 'fa-mobile-screen-button';
            if (name.includes('幫浦')) return 'fa-wind';
            
            // Medical / Health
            if (name.includes('藥') || name.includes('流感') || name.includes('暈車')) return 'fa-pills';
            if (name.includes('溫') || name.includes('計')) return 'fa-temperature-half';
            if (name.includes('罩')) return 'fa-mask-face';
            if (name.includes('剪') || name.includes('刀')) return 'fa-scissors';
            
            // Swimming / Water
            if (name.includes('泳') || name.includes('蛙')) return 'fa-person-swimming';
            if (name.includes('巾')) return 'fa-rug';
            
            // Baby / Hygiene
            if (name.includes('尿') || name.includes('嬰')) return 'fa-baby';
            if (name.includes('衛') || name.includes('紙')) return 'fa-box-tissue';
            
            // Skiing
            if (name.includes('雪') || name.includes('滑')) return 'fa-snowflake';
            if (name.includes('鏡')) return 'fa-glasses';
            if (name.includes('護')) return 'fa-shield-halved';
            
            // Misc
            if (name.includes('袋') || name.includes('包') || name.includes('架')) return 'fa-suitcase';
            
            // Fallback (Generic, NOT checkmark)
            return 'fa-circle-dot';
        }

        function router(page) {
            document.querySelectorAll('.nav-btn .nav-icon').forEach(el => el.classList.replace('text-cat-orange', 'text-gray-400'));
            const btn = document.getElementById('btn-' + page);
            if(btn) btn.querySelector('.nav-icon').classList.replace('text-gray-400', 'text-cat-orange');

            const content = document.getElementById('app-content');
            content.innerHTML = ''; 
            content.scrollTop = 0;

            switch(page) {
                case 'plan': renderPlan(content); break;
                case 'guide': renderGuide(content); break;
                case 'wallet': renderWallet(content); break;
                case 'lists': renderLists(content); break;
                case 'info': renderInfo(content); break;
            }
        }

        // --- 1. PLAN MODULE ---

            let switcherHTML = `<div class="flex px-4 gap-2 mb-4 sticky top-0 z-10 py-2 bg-muji-bg/95 backdrop-blur overflow-x-auto no-scrollbar scroll-smooth" id="day-switcher">`;

            switcherHTML += `</div>`;

            let timelineHTML = `<div id="timeline-list" class="px-4 pb-8 space-y-4 min-h-screen">${renderDayItems(currentDay)}</div>`;

            container.innerHTML = flightHTML + switcherHTML + timelineHTML;
            checkSelection();
            
            // Initial scroll
            setTimeout(() => {
                const btn = document.getElementById(`btn-${currentDay}`);
                const container = document.getElementById('day-switcher');
                if (btn && container) {
                    const scrollLeft = btn.offsetLeft - container.offsetLeft;
                    container.scrollTo({ left: scrollLeft, behavior: 'auto' });
                }
            }, 100);

        function switchDay(day) {
            currentDay = day;
            
            // Update buttons
            tripData.days.forEach(d => {
                const btn = document.getElementById(`btn-${d.key}`);
                if(btn) {
                    btn.className = `min-w-[70px] flex-1 py-2 rounded-xl text-xs font-bold transition-all shadow-sm flex flex-col items-center border border-gray-100 ${day === d.key ? 'bg-cat-orange text-white border-cat-orange' : 'bg-white text-gray-400'}`;
                }
            });

            const timelineContainer = document.getElementById('timeline-list');
            timelineContainer.innerHTML = renderDayItems(day);
            
            // 1. Scroll Page to Top
            document.getElementById('app-content').scrollTop = 0;
            
            // 2. Scroll Buttons to show next 2 buttons
            const btn = document.getElementById(`btn-${day}`);
            const container = document.getElementById('day-switcher');
            if (btn && container) {
                const scrollLeft = btn.offsetLeft - container.offsetLeft - 16; 
                container.scrollTo({ left: scrollLeft, behavior: 'smooth' });
            }
            
            checkSelection();
        }

        function renderDayItems(day) {
            return tripData.itinerary[day].map((item, index) => {
                const iconClass = icons[item.type] || 'fa-location-dot';
                const highlightClass = item.highlight ? 'text-cat-orange' : 'text-gray-400';
                const uniqueId = `${day}-${index}`;
                
                const safeAddr = item.addr ? item.addr.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
                const mapBtn = item.addr ? 
                    `<div class="mt-3 flex gap-2">
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.addr)}" target="_blank" class="flex-1 inline-flex justify-center items-center text-xs bg-gray-50 border border-gray-200 hover:bg-orange-50 hover:border-orange-200 text-gray-600 px-3 py-2 rounded-lg transition-colors shadow-sm" onclick="event.stopPropagation()">

                        </a>
                        <button data-addr="${safeAddr}" onclick="copyAddr(this.dataset.addr); event.stopPropagation();" class="inline-flex justify-center items-center w-10 text-xs bg-gray-50 border border-gray-200 text-gray-500 rounded-lg active:bg-gray-200">
                            <i class="fa-solid fa-copy"></i>

                return `

                    <div class="flex flex-col items-center min-w-[3rem] pt-2">
                        <span class="text-xs font-bold font-mono text-gray-500 mb-1">${item.time || '--:--'}</span>

                                </div>

                            </div>
                            ${mapBtn}

                </div>
                `;
            }).join('');
        }

        function toggleSelection(id) {
            document.querySelectorAll('.trip-card').forEach(el => el.classList.remove('active'));

            const card = document.getElementById(`card-${id}`);

                        </div>
                        <div id="preview-area" class="hidden mt-2">
                            <img id="img-preview" class="h-20 rounded-lg object-cover border border-gray-200">
                        </div>
                    </div>
                </div>

                <div class="pb-safe">
                    <div class="flex justify-between items-end mb-2 px-2">
                        <h3 class="font-bold text-muji-text">紀錄</h3>
                        <span class="text-xs text-gray-400">總計 ¥${totalYen.toLocaleString()} (約 NT$${totalTwd.toLocaleString()})</span>
                    </div>
                    <div class="space-y-3" id="expense-list">
                        ${expenses.slice().reverse().map((item, idx) => `
                            <div class="bg-white p-3 rounded-2xl shadow-sm flex items-center gap-3">
                                ${item.img ? `<img src="${item.img}" class="w-12 h-12 rounded-lg object-cover bg-gray-100 cursor-pointer" onclick="showFullImage('${item.img}')">` : '<div class="w-12 h-12 rounded-lg bg-gray-100 flex items-center justify-center text-gray-300"><i class="fa-solid fa-receipt"></i></div>'}
                                <div class="flex-1">
                                    <div class="font-bold text-muji-text">${item.name}</div>
                                    <div class="text-[10px] text-gray-400">${item.date}</div>
                                </div>
                                <div class="text-right">
                                    <div class="font-mono font-bold text-muji-text">¥${item.amount}</div>
                                    <div class="text-[10px] text-gray-400">NT$${Math.round(item.amount * walletRate)}</div>
                                </div>
                                <button onclick="deleteExpense(${expenses.length - 1 - idx})" class="text-gray-300 hover:text-red-400 px-2"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>`;
        }

        function updateRate(val) {
            walletRate = parseFloat(val);
            localStorage.setItem('trip_rate', walletRate);
            renderWallet(document.getElementById('app-content'));
        }

        function handleCalcKey(event) {
            if (event.key === 'Enter') {
                calculate();
                event.target.blur();
            }
        }

        function calculate() {
            const input = document.getElementById('calc-input').value.replace(/\s/g, '');
            try {
                if (!input || !/^[0-9+\-*/().]+$/.test(input)) throw new Error('invalid');
                const res = new Function('return (' + input + ')')();
                if (typeof res !== 'number' || !isFinite(res)) throw new Error('invalid');
                document.getElementById('calc-result').innerText = '¥ ' + res.toLocaleString();
                document.getElementById('calc-twd').innerText = '≈ NT$ ' + Math.round(res * walletRate).toLocaleString();
            } catch(e) {
                document.getElementById('calc-result').innerText = 'Error';
                document.getElementById('calc-twd').innerText = '';
            }
        }

        let tempImgBase64 = null;
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxWidth = 800; 
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        tempImgBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        
                        const pArea = document.getElementById('preview-area');
                        const pImg = document.getElementById('img-preview');
                        pArea.classList.remove('hidden');
                        pImg.src = tempImgBase64;
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function addExpense() {
            const name = document.getElementById('exp-name').value;
            const amount = parseFloat(document.getElementById('exp-amount').value);
            if(!name || !amount) { alert('請輸入名稱與金額'); return; }

            const newExp = {
                name, 
                amount,
                img: tempImgBase64,
                date: new Date().toLocaleString('zh-TW', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'})
            };
            expenses.push(newExp);
            try {
                localStorage.setItem('trip_expenses', JSON.stringify(expenses));
            } catch (e) {
                alert('容量已滿，請刪除舊紀錄');
                expenses.pop();
            }
            tempImgBase64 = null;
            renderWallet(document.getElementById('app-content'));
        }

        function deleteExpense(idx) {
            if(confirm('確定刪除？')) {
                expenses.splice(idx, 1);
                localStorage.setItem('trip_expenses', JSON.stringify(expenses));
                renderWallet(document.getElementById('app-content'));
            }
        }

        // --- 4. LISTS MODULE ---
        function renderLists(container) {
            // Merge custom items into Luggage list display
            let displayLuggageItems = [...tripData.checklist.luggage.items];
            if (customChecklistItems.length > 0) {
                // Add custom items to the top
                displayLuggageItems = [...customChecklistItems, ...displayLuggageItems];
            }

            // Create display data object
            const renderData = {
                luggage: { ...tripData.checklist.luggage, items: displayLuggageItems },
                ski: tripData.checklist.ski
            };

            container.innerHTML = `
            <div class="p-4 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    ${Object.keys(renderData).map(key => {
                        const list = renderData[key];
                        return `
                        <div class="bg-white rounded-3xl p-5 shadow-soft cursor-pointer hover:shadow-lg transition-all active:scale-95 flex flex-col items-center justify-center gap-3 h-32" onclick="toggleList('${key}')">
                            <i class="fa-solid ${list.icon} text-4xl ${list.color}"></i>
                            <h3 class="font-bold text-muji-text text-sm">${list.title}</h3>
                        </div>
                        `;
                    }).join('')}
                </div>

                ${Object.keys(renderData).map(key => {
                    const list = renderData[key];
                    return `
                    <div id="list-content-${key}" class="hidden bg-white rounded-3xl p-5 shadow-soft animate-fade-in">
                        <div class="flex justify-between items-center mb-4 border-l-4 border-cat-orange pl-3">
                             <h3 class="font-bold text-muji-text">${list.title}</h3>
                             <button onclick="toggleList('${key}')" class="text-gray-400"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div class="grid grid-cols-2 gap-x-3 gap-y-3">
                             ${list.items.filter(item => !deletedListItems[item]).map((item, idx) => {
                                const safeItem = item.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                                return `
                                <label class="flex items-center space-x-2 p-2 rounded-lg bg-gray-50 hover:bg-orange-50 cursor-pointer group transition-colors select-none"
                                    data-item="${safeItem}" data-list="${key}"
                                    onmousedown="startLongPress(this)" 
                                    ontouchstart="startLongPress(this)" 
                                    onmouseup="cancelLongPress()" 
                                    onmouseleave="cancelLongPress()"
                                    ontouchend="cancelLongPress()"
                                    id="item-${key}-${idx}">
                                    <div class="relative flex items-center flex-shrink-0">
                                        <input type="checkbox" onchange="toggleCheck(this.closest('label').dataset.item)" ${checklistState[item] ? 'checked' : ''} class="peer h-4 w-4 cursor-pointer appearance-none rounded border border-gray-300 transition-all checked:border-cat-orange checked:bg-cat-orange">
                                        <i class="fa-solid fa-check text-white absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[10px] opacity-0 peer-checked:opacity-100 pointer-events-none"></i>
                                    </div>
                                    <div class="flex items-center gap-1.5 min-w-0 overflow-hidden">
                                        <i class="fa-solid ${getIcon(item)} text-[10px] text-gray-400 group-hover:text-cat-orange"></i>
                                        <span class="text-xs text-gray-600 peer-checked:text-gray-300 peer-checked:line-through truncate font-medium">${item}</span>
                                    </div>
                                </label>
                                `;
                             }).join('')}
                        </div>
                        <p class="text-[10px] text-gray-300 mt-4 text-center">💡 長按項目可刪除</p>
                    </div>
                    `;
                }).join('')}

                <div class="bg-white rounded-3xl p-5 shadow-soft">
                    <h3 class="font-bold text-muji-text mb-2 border-l-4 border-cat-orange pl-3">個人備忘錄</h3>
                    <p class="text-[10px] text-gray-400 mb-2">在此輸入文字，按下儲存後，將自動新增至「旅遊行李清單」中。(可輸入多項，以換行或 "、" 分隔)</p>
                    <textarea id="memo-input" class="w-full bg-muji-bg rounded-xl p-3 text-sm leading-relaxed outline-none resize-none border border-transparent focus:border-cat-orange h-24" placeholder="例如：\n零食\n泡麵"></textarea>
                    <button onclick="saveMemoAsItem()" class="w-full mt-3 bg-cat-orange text-white py-2 rounded-lg text-sm font-bold shadow-md active:scale-95 transition-transform">儲存並加入清單</button>
                </div>
            </div>`;
        }

        function toggleList(key) {
            document.querySelectorAll('[id^="list-content-"]').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById(`list-content-${key}`);
            if(target) {
                target.classList.remove('hidden');
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function toggleCheck(item) {
            checklistState[item] = !checklistState[item];
            localStorage.setItem('trip_checklist', JSON.stringify(checklistState));
        }

        // --- Long Press Logic ---
        let longPressTimer;
        let isLongPress = false;

        function startLongPress(el) {
            isLongPress = false;
            el.classList.add('long-press-active');
            const item = el.dataset.item;
            const listKey = el.dataset.list;
            
            longPressTimer = setTimeout(() => {
                isLongPress = true;
                if(confirm(`確定刪除「${item}」嗎？`)) {
                    deleteListItem(item, listKey);
                }
                el.classList.remove('long-press-active');
            }, 800);
        }

        function cancelLongPress() {
            clearTimeout(longPressTimer);
            const activeEls = document.querySelectorAll('.long-press-active');
            activeEls.forEach(el => el.classList.remove('long-press-active'));
        }

        function deleteListItem(item, listKey) {
            // Check if it's a custom item
            const customIndex = customChecklistItems.indexOf(item);
            if (customIndex > -1) {
                // Remove from custom list array
                customChecklistItems.splice(customIndex, 1);
                localStorage.setItem('trip_custom_items', JSON.stringify(customChecklistItems));
            } else {
                // It's a static item, mark as deleted
                deletedListItems[item] = true;
                localStorage.setItem('trip_deleted_items', JSON.stringify(deletedListItems));
            }
            
            // Re-render
            renderLists(document.getElementById('app-content'));
            toggleList(listKey); // Re-open the list
        }

        function saveMemoAsItem() {
            const inputVal = document.getElementById('memo-input').value;
            if (!inputVal.trim()) return;

            // Split by newline or '、'
            const newItems = inputVal.split(/[\n、]+/).map(s => s.trim()).filter(s => s.length > 0);
            
            if (newItems.length > 0) {
                // Add to custom list
                customChecklistItems = [...newItems, ...customChecklistItems]; // Add to top
                localStorage.setItem('trip_custom_items', JSON.stringify(customChecklistItems));
                
                // Clear input
                document.getElementById('memo-input').value = '';
                
                // Re-render lists
                renderLists(document.getElementById('app-content'));
                
                // Auto open luggage list to show new item
                toggleList('luggage');
                
                alert(`已新增 ${newItems.length} 個項目至行李清單`);
            }
        }

        // --- 5. INFO MODULE ---
        function renderInfo(container) {
            container.innerHTML = `
            <div class="p-4 space-y-4">
                <div class="bg-blue-50 p-5 rounded-2xl shadow-sm border border-blue-100">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="bg-blue-500 text-white w-8 h-8 rounded-full flex items-center justify-center"><i class="fa-solid fa-cloud-sun"></i></div>
                        <h3 class="font-bold text-blue-900">天氣預報</h3>
                    </div>
                    <a href="https://www.jma.go.jp/bosai/forecast/#area_type=offices&area_code=230000" target="_blank" class="block bg-white text-center py-2 rounded-lg text-blue-600 font-bold text-sm shadow-sm">
                        查看名古屋 (日本氣象廳)
                    </a>
                </div>
                
                <div class="bg-red-50 p-5 rounded-2xl shadow-sm border border-red-100">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="bg-red-500 text-white w-8 h-8 rounded-full flex items-center justify-center"><i class="fa-solid fa-phone"></i></div>
                        <h3 class="font-bold text-red-900">緊急聯絡</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div class="bg-white p-2 rounded-lg text-center"><div class="text-xs text-gray-500">警察局</div><div class="text-lg font-black text-red-600 font-mono">110</div></div>
                        <div class="bg-white p-2 rounded-lg text-center"><div class="text-xs text-gray-500">救護車</div><div class="text-lg font-black text-red-600 font-mono">119</div></div>
                    </div>
                     <div class="bg-white p-3 rounded-lg text-xs text-gray-600">
                        <strong>台北駐大阪經濟文化辦事處：</strong><br>
                        090-8794-4568 (緊急)
                    </div>
                </div>

                <div class="bg-purple-50 p-5 rounded-2xl shadow-sm border border-purple-100">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="bg-purple-500 text-white w-8 h-8 rounded-full flex items-center justify-center"><i class="fa-solid fa-plane-up"></i></div>
                        <h3 class="font-bold text-purple-900">華航行李須知</h3>
                    </div>
                    <div class="space-y-3 text-sm text-gray-700">
                        <div class="bg-white p-3 rounded-xl">
                            <p class="font-bold text-purple-700 mb-1">🧳 托運行李 (經濟艙)</p>
                            <p class="text-xs">計件制：通常為 <strong>2件</strong>，每件限重 <strong>23kg</strong>。</p>
                        </div>
                        <div class="bg-white p-3 rounded-xl">
                            <p class="font-bold text-purple-700 mb-1">🎒 手提行李</p>
                            <p class="text-xs">1件 (7kg) + 1件個人隨身物品。</p>
                        </div>
                        <ul class="list-disc pl-5 text-xs space-y-1 text-gray-600">
                            <li><strong>鋰電池/行動電源：</strong>務必<span class="text-red-500 font-bold">隨身攜帶</span>，不可托運。</li>
                            <li><strong>液體：</strong>隨身攜帶單瓶不可超過 100ml，需裝於 1L 透明夾鏈袋。</li>
                            <li><strong>打火機：</strong>限隨身攜帶 1 個 (藍焰防風型禁止)。</li>
                        </ul>
                        <a href="https://www.china-airlines.com/tw/zh/fly/prepare-for-the-fly/baggage/baggage-rules" target="_blank" class="block w-full bg-purple-200 text-purple-800 text-center py-2 rounded-lg text-xs font-bold mt-2">
                            查看官網詳細規定
                        </a>
                    </div>
                </div>

                 <div class="bg-white p-5 rounded-2xl shadow-soft">
                    <h3 class="font-bold text-muji-text mb-3"><i class="fa-solid fa-triangle-exclamation text-yellow-500 mr-2"></i>注意事項</h3>
                    <ul class="list-disc pl-5 text-sm text-gray-600 space-y-1">
                        <li>電壓 100V (雙扁腳插頭)。</li>
                        <li>自駕請務必遵守「行人優先」與「右駕左行」。</li>
                        <li>入境禁止攜帶肉類製品。</li>
                    </ul>
                </div>
            </div>`;
        }

        // --- Start App ---
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
